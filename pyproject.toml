[project]
name = "jovaltus"
version = "0.3.1"
description = "Jovaltus Agent Mode — Hermes plugin for automated development pipeline"
requires-python = ">=3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.pytest.ini_options]
pythonpath = [".."]
testpaths = ["tests"]
